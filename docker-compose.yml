version: "3.8"

services:

  eureka-server:
    build: ./Eureka-Server
    ports:
      - "8761:8761"

  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server

  api-gateway:
    build: ./API-Gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - config-server

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - config-server

  order-service:
    build: ./order-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - config-server

  user-service:
    build: ./user-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - config-server